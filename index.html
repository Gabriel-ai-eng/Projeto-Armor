<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Acesso canônico: o jogo só deve rodar sob o domínio da plataforma
         (alpsprime.com.br/jogo) — mesma origem em que a sessão de login já
         existe. Se alguém abrir o domínio "cru" da Vercel (*.vercel.app),
         mandamos para o caminho oficial. Roda no navegador do usuário, então
         NÃO afeta o proxy interno do AlpsPrime (que só busca o HTML, sem JS). -->
    <script>
      if (location.hostname.endsWith(".vercel.app")) {
        location.replace("https://www.alpsprime.com.br/jogo/" + location.search + location.hash);
      }
    </script>
    <!-- viewport-fit=cover: em tela cheia, o jogo desenha também na área do
         recorte da câmera (notch/furo) — sem isso o navegador deixa faixas
         pretas nas laterais em paisagem. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Projeto Armor — Capítulo 1: O Despertar." />
    <link rel="icon" type="image/webp" href="/armor-logo.webp" />
    <!-- Baixa o vídeo da tela inicial junto com a página, antes mesmo do JS
         rodar, para ele aparecer na hora quando o celular virar de lado.
         WebM/VP9 primeiro (bem mais leve); MP4/H.264 como fallback para quem
         não suporta VP9 (ex.: Safari/iOS mais antigos). O atributo `type` faz
         o navegador baixar só o formato que ele realmente consegue tocar. -->
    <link rel="preload" href="/armor-intro.webm?v=1" as="video" type="video/webm; codecs=vp9" fetchpriority="high" />
    <link rel="preload" href="/armor-intro.mp4?v=6" as="video" type="video/mp4; codecs=avc1" fetchpriority="high" />
    <!-- Fonte Rajdhani: usada no bloco de perfil da tela inicial (nome + nível).
         Carregada SEM BLOQUEAR: como <link rel="stylesheet"> normal, o navegador
         segura a renderização e o JS do app inteiro até o Google Fonts responder
         — com rede lenta isso atrasava a tela inicial em vários segundos. O
         truque media="print" + onload aplica a fonte só quando ela chegar; até
         lá o texto usa a fonte padrão (display=swap). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'" />
    <title>Projeto Armor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
